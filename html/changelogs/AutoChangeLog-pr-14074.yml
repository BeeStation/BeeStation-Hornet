author: rkz, sohpeach, Mothblocks, dragomagol, Timberpoes, timothymtorres, MrMelbert,
  GPeckman, ninjanomnom, 00-steven, grungussuss, vinylspiders
delete-after: true
changes:
  - rscadd: adds feedback message when speaking into a radio
  - rscadd: you can now disable radio noises
  - rscadd: adds better receiving and transmission radio noises
  - code_imp: phobias use less regular expressions and don't instantiate them all
      the time (performance)
  - bugfix: Fixed a bug where you could not start messages with an ellipses.
  - bugfix: Fixed not being able to sing over comms.
  - bugfix: phobias cannot be triggered by words in languages you don't understand
  - code_imp: to_chat now crashes if it receives a null arg
  - code_imp: audits say to prevent double encoding
  - bugfix: Fix hypnosis, mind echo trauma, phobia trauma, hypnotic trigger trauma,
      split personality brainwashing trauma, and codeword hearing all bypassing language
      and hearing checks. If you try to give commands to a victim in a language they
      don't understand, they will no longer magically understand the words.
  - refactor: Refactored saycode to be more robust, readable, and have more unit tests.
  - rscadd: You can talk via plushies, action figures, and toy mechs via .l or .r,
      same as a ventriloquist dummy or decapitated dead
  - rscdel: Talking via a plushie, action figure, toy mech, ventriloquist dummy, decapitated
      head, or marionette won't transmit over open mic comms
  - rscadd: whispers now show a message if you cannot hear them, but can see them
  - bugfix: adds ".hear" span classes to .scss files (literally missing for years)
