author: EvilDragonfiend
delete-after: true
changes:
  - code_imp: refactored access system - now it is reliable on the SSdepartment subsystem.
  - rscadd: centcom console now can edit station access + extra special access (*Bloodcult,
      syndicate, away station, space police ship, etc)
  - tweak: HoP console is slightly refactored - Job and Access order has been reworked,
      and it follows SSdepartment's internal order.
  - tweak: HoP door remote can now open cargo areas in addition to what it can open
      already
  - bugfix: Introducing ACCESS_SERVICE that has been in the game for years but never
      had been a part of the access list
  - tweak: Demote now works to everyone - it just changes their job name. For example,
      if a CMO demotes Captain, they still keeps the access, and the job title just
      becomes "Demoted". You will need to manually remove their access.
  - tweak: Psychiatrist is now fully categorised in medical department.
  - tweak: Stage Magician is now categorised in Service department.
