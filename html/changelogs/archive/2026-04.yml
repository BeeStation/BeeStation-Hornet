  - code_imp: Cleaned up legacy spritesheets code.
  - code_imp: Updated names of some IconForge GAGS functions to match newer versions
      of IconForge.
  - rscdel: Removed unused PDA icons spritesheet.
  rkz, son-of-space, jolly:
  - bugfix: The civilian remote now properly affects service department doors
  - bugfix: Some areas are now properly affected by ai monitoring
  - code_imp: The typepath used for station turfs has been changed from /area/* to
      /area/station/* for clarity and consistency.
  - code_imp: Space_Station_13_areas.dm had its station specific turf moved to station.dm
  - imageadd: Some turfs were given icons (which didn't exist prior).
