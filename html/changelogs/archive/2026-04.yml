2026-04-01:
  rkz, Ebin-Halcyon:
  - rscadd: moths can now set mutcolors
  - rscadd: moth bodyparts use new greyscale sprites
  - rscadd: adds new moth eye option, and makes it a preference
2026-04-02:
  Isaac:
  - balance: Mech now has a do_after per fixing attempt, requiring 2 seconds per welding
  - bugfix: Mech equipment is once again disabled for 6 seconds when hit with an EMP
  - balance: Techshells cost reduced to 0.6 at 100% efficiency
  - code_imp: Removed an extra initialize pill bottles had
  nre_player, Racc-Off:
  - bugfix: Fixes turret's description
2026-04-04:
  Isaac:
  - bugfix: Most magic protection has been removed from common sources, while keeping
      holy ones
  - bugfix: Fixes timestop stopping you inside even if you were protected against
      magic
  - balance: Heretic Spells moved to holy magic protection
2026-04-05:
  Rukofamicom:
  - bugfix: Growth serum no longer stacks infinitely when smoked and requires at least
      10u to have a noticable effect
  ? rkz, sohpeach, Mothblocks, dragomagol, Timberpoes, timothymtorres, MrMelbert,
    GPeckman, ninjanomnom, 00-steven, grungussuss, vinylspiders
  : - rscadd: adds feedback message when speaking into a radio
    - rscadd: you can now disable radio noises
    - rscadd: adds better receiving and transmission radio noises
    - code_imp: phobias use less regular expressions and don't instantiate them all
        the time (performance)
    - bugfix: Fixed a bug where you could not start messages with an ellipses.
    - bugfix: Fixed not being able to sing over comms.
    - bugfix: phobias cannot be triggered by words in languages you don't understand
    - code_imp: to_chat now crashes if it receives a null arg
    - code_imp: audits say to prevent double encoding
    - bugfix: Fix hypnosis, mind echo trauma, phobia trauma, hypnotic trigger trauma,
        split personality brainwashing trauma, and codeword hearing all bypassing
        language and hearing checks. If you try to give commands to a victim in a
        language they don't understand, they will no longer magically understand the
        words.
    - refactor: Refactored saycode to be more robust, readable, and have more unit
        tests.
    - rscadd: You can talk via plushies, action figures, and toy mechs via .l or .r,
        same as a ventriloquist dummy or decapitated dead
    - rscdel: Talking via a plushie, action figure, toy mech, ventriloquist dummy,
        decapitated head, or marionette won't transmit over open mic comms
    - rscadd: whispers now show a message if you cannot hear them, but can see them
    - bugfix: adds ".hear" span classes to .scss files (literally missing for years)
2026-04-07:
  DrDuckedGoose:
  - bugfix: Fixes lasso functionality
  - rscadd: reenables traitor lassos in uplink
