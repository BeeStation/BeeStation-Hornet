        Mouse button. Don't worry, it defaults to off.
    - rscadd: All mechs now use the mouse reticle, and the reticle is disabled when
        weapons safety is turned on.
    - bugfix: AIs have had their mech abilities resolved. With weapons safety off,
        equipment is used. With weapons safety on, AI clicks are used.
    - bugfix: Fixes getting AIs with cores getting gibbed if their mech theyre controlling
        is destroyed
    - refactor: un-nested and removed the working, medical, and combat mech subtypes.
        Merged vars into parent mech type.
    - balance: The Mecha Extinguisher equipment is now classified as utility.
    - balance: The Mecha Extinguisher now puts out fires in a 3x3 square (centered
        on the mech). However, it also only has five uses now. Save it for emergencies!
    - rscadd: completely overhauls mech construction code. It will now use balloon
        alerts, and always show next steps. No more wiki needed.
    - refactor: flick_overlay is an atom proc
    - balance: mech wire panels can no longer be accessed while the mech is occupied
    - balance: mech equipment attachment delays only apply to occupied mechs
