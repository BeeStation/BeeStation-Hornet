    - bugfix: Fixed mech temperature regulator ignoring gas heat capacity
    - bugfix: Fixed mech stopping processing other things while not heating internal
        air
    - bugfix: Fixed mech being able to leave transit tube in transit
    - bugfix: Fixed mech internal damage flags working incorrectly
    - bugfix: Fixed Gygax leg overloading being useless
    - bugfix: Fixed mechs ignoring their stock parts on creation. Syndicate mechs
        now stronger against lasers and consume less energy on move. Upgrading from
        tier 1 to tier 2 doesn't make mech consume MORE energy than before the upgrade.
    - balance: Rebalanced mech energy drain with part upgrades. Base energy drain
        reduced by 50%, 33%, 25% with upgrades and applies to movement (manipulator
        rating), phasing, punching, light (Capacitor rating).
