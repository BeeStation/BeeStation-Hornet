author: r1ks-iwnl, GoldenAlpharex, cacogen, Superlagg, neopythagorean, SuperNovaa41,
  StrangeWeirdKitten, Kocma-san, GreytideSkye, vinylspiders, norsvenska, 00-Steven,
  MrMelbert
delete-after: true
changes:
  - rscadd: Added new keywords (%d, %date, %t, %time) for fields
  - rscadd: You can now stamp papers while blind.
  - spellcheck: Photocopier finally learned about %date and %time, and changed the
      forms' fields to accommodate them.
  - bugfix: Fixes preloaded clipboards
  - bugfix: Clearing paper, like by splashing it with ethanol, actually resets its
      icon state to the cleared version.
  - bugfix: Photocopying no longer removes the stamp overlays from the original paper,
      and actually copies them to the copy.
  - bugfix: Paper that's on a clipboard doesn't need to be poked to realise that its
      appearance has changed and to properly display it on a clipboard.
  - bugfix: You finally figured that using a stamp on a clipboard was more important
      than using the pen that's currently attached to it. Congratulations!
  - bugfix: Hitting cancel when renaming a paper now actually cancels the operation.
  - code_imp: Added support for preventing a pen from being removed from a clipboard.
