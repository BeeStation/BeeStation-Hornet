author: rkz, SuperNovaa41, ZephyrTFA, tralezab, smartKar, lizardqueenlexi
delete-after: true
changes:
  - bugfix: Implemented "jelly eyes" to make jellypeople and stargazers use the proper
      eyes sprite.
  - bugfix: You can no longer delete your cult eyes or halo by transforming into a
      monkey, and then into a human.
  - bugfix: You can no longer delete your cult eyes or halo by transforming as a changeling.
  - bugfix: Simplemobs now receive glowing eyes and a cult halo.
  - refactor: Turns cult eyes and cult halos into elements, and improves the code
      a touch.
  - refactor: Eyes now support having two different colors for each eye
